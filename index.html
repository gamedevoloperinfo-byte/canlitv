<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı TV Platformu</title>
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <style>
        body { 
            background-color: #111; 
            color: white; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .player-container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: #000; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        .title { margin-bottom: 20px; font-weight: normal; }
        
        /* Iframe başlangıçta gizlidir, sadece hata olursa görünür */
        #backup-iframe { 
            width: 100%; 
            height: 450px; 
            border: none; 
            display: none; 
        }
    </style>
</head>
<body>

    <h2 class="title" id="channel-title">Kanal Yükleniyor...</h2>
    
    <div class="player-container">
        <video id="my-video" class="video-js vjs-default-skin vjs-16-9" controls preload="auto" width="100%" height="450">
        </video>
        <iframe id="backup-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <script>
        // --- DİKKAT: SUPABASE BİLGİLERİNİ BURAYA GİR ---
        const SUPABASE_URL = 'https://dxcltfiodkwyyeakhxxf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4Y2x0ZmlvZGt3eXllYWtoeHhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTMzOTAsImV4cCI6MjA5NjIyOTM5MH0.-ehjMOMh9YYWcba4zxBC0iBZ-DGlTR4Vw2G0kpPKBnA';

        let retryCount = 0;
        const maxRetries = 3;
        let player = videojs('my-video');
        let currentChannel = null;

        // Supabase'den sadece 'active' olan kanalları çek
        fetch(`${SUPABASE_URL}/rest/v1/channels?status=eq.active&select=*`, {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            }
        })
        .then(res => res.json())
        .then(data => {
            if(data && data.length > 0) {
                currentChannel = data[0]; 
                document.getElementById('channel-title').innerText = currentChannel.name;
                initPlayer(currentChannel);
            } else {
                document.getElementById('channel-title').innerText = "Aktif kanal bulunamadı.";
            }
        })
        .catch(err => {
            console.error("API Bağlantı Hatası:", err);
            document.getElementById('channel-title').innerText = "Veri çekilemedi.";
        });

        function initPlayer(channel) {
            // Yayını başlat
            player.src({ type: 'application/x-mpegURL', src: channel.m3u8_url });
            player.play();

            // Hata Yakalama ve Fallback (Yedek) Mantığı
            player.on('error', function() {
                if (retryCount < maxRetries) {
                    retryCount++;
                    document.getElementById('channel-title').innerText = `${channel.name} (Bağlantı koptu. Yeniden deneniyor... ${retryCount}/${maxRetries})`;
                    
                    setTimeout(() => {
                        player.src({ type: 'application/x-mpegURL', src: channel.m3u8_url });
                        player.play();
                    }, 2000); 
                } else {
                    console.log("Yayın kurtarılamadı, Iframe yedeğine geçiliyor.");
                    document.getElementById('channel-title').innerText = `${channel.name} (Alternatif Kaynak)`;
                    
                    document.querySelector('.video-js').style.display = 'none'; 
                    
                    const iframe = document.getElementById('backup-iframe');
                    iframe.src = channel.iframe_url; 
                    iframe.style.display = 'block'; 
                }
            });
        }
    </script>
</body>
</html>
