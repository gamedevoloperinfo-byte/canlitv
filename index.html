<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı TV Platformu</title>
    <link href="https://vjs.zencdn.net/8.6.1/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg-color: #0f1115; --panel-bg: #1a1d24; --text-color: #ffffff; --accent-color: #e50914; --hover-color: #2a2d35; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        .header { background-color: var(--panel-bg); padding: 15px 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border-bottom: 2px solid var(--accent-color); }
        .header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .main-container { display: flex; flex-wrap: wrap; max-width: 1200px; margin: 20px auto; padding: 0 15px; gap: 20px; }
        
        .player-section { flex: 1 1 700px; background: #000; border-radius: 10px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
        
        /* Video ve Iframe'i Aynı Çerçeveye Oturtan Kilit Tasarım */
        #video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        #video-wrapper > * { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #backup-iframe { border: none; display: none; background: #000; }
        
        .current-channel-info { background: var(--panel-bg); padding: 15px; font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 15px; }
        .current-channel-info img { height: 40px; border-radius: 5px; }
        
        .channel-list-section { flex: 1 1 300px; background: var(--panel-bg); border-radius: 10px; padding: 15px; max-height: 550px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .channel-list-section h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .channel-list-section::-webkit-scrollbar { width: 8px; }
        .channel-list-section::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        .channel-list-section::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
        .channel-item { display: flex; align-items: center; padding: 10px; margin-bottom: 8px; background-color: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; transition: all 0.3s ease; gap: 15px; }
        .channel-item:hover, .channel-item.active { background-color: var(--hover-color); border-left: 4px solid var(--accent-color); transform: translateX(5px); }
        .channel-item img { width: 60px; height: auto; border-radius: 4px; background: #fff; padding: 2px; }
        .channel-item span { font-weight: bold; font-size: 15px; }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .player-section, .channel-list-section { flex: 1 1 100%; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>📺 Canlı TV Platformu</h1>
    </div>

    <div class="main-container">
        <div class="player-section">
            <div id="video-wrapper">
                <div id="vjs-container">
                    <video id="my-video" class="video-js vjs-default-skin" controls preload="auto"></video>
                </div>
                <iframe id="backup-iframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
            
            <div class="current-channel-info" id="current-info">
                <img id="current-logo" src="" alt="Logo" style="display:none;">
                <span id="channel-title">Kanal Yükleniyor...</span>
            </div>
        </div>

        <div class="channel-list-section">
            <h3>Kanal Listesi</h3>
            <div id="channel-list"></div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.6.1/video.min.js"></script>
    <script>
        // --- BURAYA SUPABASE URL VE ANON_KEY BİLGİLERİNİ GİRMEYİ UNUTMA ---
        const SUPABASE_URL = 'https://dxcltfiodkwyyeakhxxf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4Y2x0ZmlvZGt3eXllYWtoeHhmIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDY1MzM5MCwiZXhwIjoyMDk2MjI5MzkwfQ.wg7dEIFghK4BXotvye3QFjHAJwNC2iWPWqfwT3B3UM0';

        let player = videojs('my-video', {fluid: true}); 
        let activeChannel = null;

        fetch(`${SUPABASE_URL}/rest/v1/channels?select=*&order=id.asc`, {
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        })
        .then(res => res.json())
        .then(data => {
            const listContainer = document.getElementById('channel-list');
            if(data && data.length > 0) {
                data.forEach((channel, index) => {
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    div.innerHTML = `<img src="${channel.logo_url || 'https://via.placeholder.com/60x40?text=TV'}" alt="${channel.name}"><span>${channel.name}</span>`;
                    
                    div.onclick = () => {
                        document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                        div.classList.add('active');
                        playChannel(channel);
                    };
                    listContainer.appendChild(div);

                    if(index === 0) { div.classList.add('active'); playChannel(channel); }
                });
            } else {
                listContainer.innerHTML = "<p>Henüz kanal bulunamadı.</p>";
            }
        })
        .catch(err => console.error("Hata:", err));

        function playChannel(channel) {
            activeChannel = channel;
            document.getElementById('channel-title').innerText = channel.name;
            
            const logoImg = document.getElementById('current-logo');
            if(channel.logo_url) { logoImg.src = channel.logo_url; logoImg.style.display = 'block'; } 
            else { logoImg.style.display = 'none'; }

            const vjsContainer = document.getElementById('vjs-container');
            const iframe = document.getElementById('backup-iframe');

            // Eğer m3u8 linki boşsa hiç uğraşma, direkt Iframe'e (Alternatif) geç
            if (!channel.m3u8_url || channel.m3u8_url.trim() === "") {
                switchToIframe(channel);
                return;
            }

            // Normal Oynatıcıyı aç
            iframe.style.display = 'none';
            iframe.src = "";
            vjsContainer.style.display = 'block';

            player.src({ type: 'application/x-mpegURL', src: channel.m3u8_url });
            player.play().catch(e => console.log("Otomatik oynatma bekliyor."));
        }

        function switchToIframe(channel) {
            console.log("IP Kilidi aşılamadı, Alternatif (Iframe) kaynağa geçiliyor.");
            document.getElementById('channel-title').innerText = `${channel.name} (Alternatif Kaynak)`;
            
            document.getElementById('vjs-container').style.display = 'none';
            const iframe = document.getElementById('backup-iframe');
            
            if (channel.iframe_url && channel.iframe_url.trim() !== "") {
                iframe.src = channel.iframe_url;
            } else {
                iframe.src = 'about:blank';
                document.getElementById('channel-title').innerText = `${channel.name} (Yayın Bulunamadı)`;
            }
            iframe.style.display = 'block';
            player.pause(); 
        }

        // M3U8 Hata verirse saniye bile bekleme, ANINDA yedek Iframe'i çalıştır!
        player.on('error', function() {
            if(activeChannel) switchToIframe(activeChannel);
        });
    </script>
</body>
</html>
